# LeadsHer Microservices - Render Blueprint
# https://render.com/docs/blueprint-spec
#
# Prerequisites:
# 1. Create MongoDB Atlas cluster (Render doesn't offer managed MongoDB)
# 2. Add MONGODB_URI and JWT_SECRET as Environment Variables in Render Dashboard
#    (or create an env group and reference it)
#
# Deploy: Connect repo to Render, then "Apply" this Blueprint

services:
  # --- Private backend services (internal only) ---

  - type: pserv
    runtime: docker
    name: auth-service
    rootDir: backend/services/auth-service
    dockerfilePath: Dockerfile
    envVars:
      - key: MONGODB_URI
        sync: false  # Set manually in Dashboard
      - key: JWT_SECRET
        sync: false  # Set manually in Dashboard
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PORT
        value: 5001

  - type: pserv
    runtime: docker
    name: story-service
    rootDir: backend/services/story-service
    dockerfilePath: Dockerfile
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PORT
        value: 5002

  - type: pserv
    runtime: docker
    name: mentorship-service
    rootDir: backend/services/mentorship-service
    dockerfilePath: Dockerfile
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PORT
        value: 5003

  - type: pserv
    runtime: docker
    name: resource-service
    rootDir: backend/services/resource-service
    dockerfilePath: Dockerfile
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PORT
        value: 5004

  # --- Public API Gateway (routes to all services) ---

  - type: web
    runtime: docker
    name: api-gateway
    rootDir: api-gateway
    dockerfilePath: Dockerfile
    envVars:
      - key: AUTH_SERVICE_HOST
        fromService:
          type: pserv
          name: auth-service
          property: host
      - key: AUTH_SERVICE_PORT
        fromService:
          type: pserv
          name: auth-service
          property: port
      - key: STORY_SERVICE_HOST
        fromService:
          type: pserv
          name: story-service
          property: host
      - key: STORY_SERVICE_PORT
        fromService:
          type: pserv
          name: story-service
          property: port
      - key: MENTORSHIP_SERVICE_HOST
        fromService:
          type: pserv
          name: mentorship-service
          property: host
      - key: MENTORSHIP_SERVICE_PORT
        fromService:
          type: pserv
          name: mentorship-service
          property: port
      - key: RESOURCE_SERVICE_HOST
        fromService:
          type: pserv
          name: resource-service
          property: host
      - key: RESOURCE_SERVICE_PORT
        fromService:
          type: pserv
          name: resource-service
          property: port
