services:
  mongo:
    image: mongo:7
    container_name: leadsher-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - leadsher-network

  auth-service:
    build:
      context: ./backend/services/auth-service
      dockerfile: Dockerfile
    container_name: leadsher-auth
    ports:
      - "5001:5001"
    env_file:
      - backend/.env
    environment:
      - PORT=5001
      - JWT_SECRET=${JWT_SECRET:-superkey}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - AUTH_SERVICE_PORT=5001
      - DOTENV_PATH=/dev/null
    depends_on:
      - mongo
    networks:
      - leadsher-network
    restart: unless-stopped

  story-service:
    build:
      context: ./backend/services/story-service
      dockerfile: Dockerfile
    container_name: leadsher-story
    ports:
      - "5002:5002"
    env_file:
      - backend/.env
    environment:
      - PORT=5002
      - JWT_SECRET=${JWT_SECRET:-superkey}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - STORY_SERVICE_PORT=5002
      - DOTENV_PATH=/dev/null
    volumes:
      - story-uploads:/app/uploads/stories
    depends_on:
      - mongo
    networks:
      - leadsher-network
    restart: unless-stopped

  mentorship-service:
    build:
      context: ./backend/services/mentorship-service
      dockerfile: Dockerfile
    container_name: leadsher-mentorship
    ports:
      - "5003:5003"
    env_file:
      - backend/.env
    environment:
      - PORT=5003
      - JWT_SECRET=${JWT_SECRET:-superkey}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - MENTORSHIP_SERVICE_PORT=5003
      - DOTENV_PATH=/dev/null
    depends_on:
      - mongo
    networks:
      - leadsher-network
    restart: unless-stopped

  resource-service:
    build:
      context: ./backend/services/resource-service
      dockerfile: Dockerfile
    container_name: leadsher-resource
    ports:
      - "5004:5004"
    env_file:
      - backend/.env
    environment:
      - PORT=5004
      - JWT_SECRET=${JWT_SECRET:-superkey}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - RESOURCE_SERVICE_PORT=5004
      - DOTENV_PATH=/dev/null
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    volumes:
      - resource-uploads:/app/uploads/resources
    depends_on:
      - mongo
    networks:
      - leadsher-network
    restart: unless-stopped

  forum-service:
    build:
      context: ./backend/services/forum-service
      dockerfile: Dockerfile
    container_name: leadsher-forum
    ports:
      - "5005:5005"
    env_file:
      - backend/.env
    environment:
      - PORT=5005
      - JWT_SECRET=${JWT_SECRET:-superkey}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - FORUM_SERVICE_PORT=5005
      - DOTENV_PATH=/dev/null
    depends_on:
      - mongo
    networks:
      - leadsher-network
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: leadsher-gateway
    ports:
      - "5000:5000"
    depends_on:
      - auth-service
      - story-service
      - mentorship-service
      - resource-service
      - forum-service
      - event-service
    networks:
      - leadsher-network
    restart: unless-stopped

  event-service:
    build:
      context: ./backend/services/event-service
      dockerfile: Dockerfile
    container_name: leadsher-event
    ports:
      - "5006:5006"
    env_file:
      - backend/.env
    environment:
      - PORT=5006
      - JWT_SECRET=${JWT_SECRET:-superkey}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - EVENT_SERVICE_PORT=5006
      - DOTENV_PATH=/dev/null
    depends_on:
      - mongo
    networks:
      - leadsher-network
    restart: unless-stopped

volumes:
  mongo-data:
  story-uploads:
  resource-uploads:


networks:
  leadsher-network:
    driver: bridge
