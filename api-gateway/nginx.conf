upstream auth_service {
    server auth-service:5001;
}

upstream story_service {
    server story-service:5002;
}

upstream mentorship_service {
    server mentorship-service:5003;
}

upstream resource_service {
    server resource-service:5004;
}

upstream forum_service {
    server forum-service:5005;
}

server {
    listen 5000;
    server_name localhost;

    # Max upload size (100MB for resource videos/files)
    client_max_body_size 100M;

    # CORS headers
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

    # Handle preflight requests
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Auth service
    location /api/auth {
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Story service
    location /api/stories {
        proxy_pass http://story_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static uploads (story images) — keep trailing slash for static serving
    location /uploads/resources/ {
        proxy_pass http://resource_service/uploads/resources/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /uploads/ {
        proxy_pass http://story_service/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Mentorship service - mentors
    location /api/mentors {
        proxy_pass http://mentorship_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Mentorship service - mentorship
    location /api/mentorship {
        proxy_pass http://mentorship_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Resource service
    location /api/resources {
        proxy_pass http://resource_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Forum service
    location /api/forum {
        proxy_pass http://forum_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Aggregated health check
    location /api/health {
        default_type application/json;
        return 200 '{"status":"ok","gateway":"nginx","services":["auth-service:5001","story-service:5002","mentorship-service:5003","resource-service:5004","forum-service:5005"]}';
    }

    # Root route
    location = / {
        default_type application/json;
        return 200 '{"name":"LeadsHer API","message":"Amplifying women leadership through storytelling and mentorship","version":"1.0","docs":{"health":"/api/health","auth":"/api/auth","mentors":"/api/mentors","mentorship":"/api/mentorship","stories":"/api/stories","resources":"/api/resources","forum":"/api/forum"}}';
    }
}
